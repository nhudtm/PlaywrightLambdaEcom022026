name: UI Tests (Playwright + TestNG)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build config.properties from GitHub Secrets
        shell: bash
        run: |
          mkdir -p src/test/resources/config
          cat <<EOF > src/test/resources/config/config.properties
          jira.site.url=${{ secrets.JIRA_SITE_URL }}
          jira.username=${{ secrets.JIRA_USERNAME }}
          jira.api.key=${{ secrets.JIRA_API_KEY }}
          jira.project.key=${{ secrets.JIRA_PROJECT_KEY }}
          browserstack.username=${{ secrets.BROWSERSTACK_USERNAME }}
          browserstack.access.key=${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          devUrl=${{ secrets.APP_DEV_URL }}
          browser=
          username=
          email=${{ secrets.TEST_EMAIL }}
          password=${{ secrets.TEST_PASSWORD }}
          EOF

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "${{ secrets.APP_DEV_URL }}" || (echo "Missing APP_DEV_URL" && exit 1)
          test -n "${{ secrets.TEST_EMAIL }}" || (echo "Missing TEST_EMAIL" && exit 1)
          test -n "${{ secrets.TEST_PASSWORD }}" || (echo "Missing TEST_PASSWORD" && exit 1)

      - name: Install Playwright browsers
        run: mvn -B -q -DskipTests compile exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Run TEST suite
        env:
          HEADLESS: "true"
        run: mvn -B -Denvironment=TEST test

      - name: Generate Allure report
        if: always()
        run: mvn allure:report

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: ignore

      - name: Upload extent report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: extent-report
          path: extentReport
          if-no-files-found: ignore

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshots
          path: screenshots
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: ignore

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-report
          path: target/allure-report
          if-no-files-found: ignore

      - name: Upload Allure Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/allure-report

  deploy-allure-pages:
    needs: test
    if: always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
